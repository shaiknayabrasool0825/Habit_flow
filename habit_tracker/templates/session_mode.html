<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Session - {{ session.habit.name }}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            text-align: center;
        }

        .session-container {
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .habit-title {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            color: var(--accent-primary);
        }

        .timer-display {
            font-size: 6rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            margin: 0;
            color: var(--text-primary);
        }

        .motivational-text {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .cancel-btn {
            margin-top: 4rem;
            padding: 10px 20px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .cancel-btn:hover {
            color: #ef4444;
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }
    </style>
</head>

<body data-theme="{{ request.cookies.get('theme', 'light') }}">
    <!-- Pass data safely to JS -->
    <div id="sessionData" data-session-id="{{ session.id }}" data-duration="{{ session.planned_duration }}"
        style="display: none;"></div>

    <div class="session-container">
        <h1 class="habit-title">{{ session.habit.name }}</h1>

        <div class="timer-display" id="timerDisplay">
            --:--
        </div>

        <p class="motivational-text">"Stay focused. Progress is happening."</p>

        <button id="cancelSessionBtn" class="cancel-btn">Cancel Session</button>
    </div>

    <script src="{{ url_for('static', filename='js/session_mode.js') }}"></script>
</body>

</html>
